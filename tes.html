<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHP OMNI-SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: #38bdf8; font-family: 'Consolas', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .neon-border { border: 1px solid #0ea5e9; box-shadow: 0 0 10px #0ea5e9; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #0ea5e9; border-radius: 10px; }
    </style>
</head>
<body class="p-2 sm:p-6">

    <div class="max-w-4xl mx-auto space-y-6">
        <header class="text-center p-4 glass rounded-xl neon-border">
            <h1 class="text-3xl font-black tracking-tst">MHP OMNI-SYSTEM</h1>
            <p class="text-xs text-sky-400 opacity-70">AUTHORIZED ACCESS ONLY: MASTER MHP</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="glass p-4 rounded-xl flex flex-col h-[400px]">
                <h2 class="text-lg font-bold mb-2 flex items-center">💬 MHP_CHAT_v1.0</h2>
                <div id="chat-display" class="flex-grow overflow-y-auto space-y-2 p-2 bg-black/40 rounded border border-slate-800 text-sm mb-3">
                    <p class="text-sky-500">[SYSTEM]: Menunggu perintah, Master MHP...</p>
                </div>
                <div class="flex gap-2">
                    <input id="chat-input" type="text" placeholder="Masukkan perintah..." class="flex-grow bg-slate-900 border border-slate-700 p-2 rounded text-white focus:outline-none focus:border-sky-500">
                    <button onclick="mhpChat()" class="bg-sky-700 hover:bg-sky-500 text-white px-4 py-2 rounded transition">SEND</button>
                </div>
            </div>

            <div class="glass p-4 rounded-xl flex flex-col h-[400px]">
                <h2 class="text-lg font-bold mb-2 flex items-center">🎨 IMAGE_GEN_LAB</h2>
                <textarea id="prompt-input" placeholder="Contoh: Madu Hitam Perkasa on a futuristic lab table..." class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-sm text-white h-24 mb-3 focus:outline-none focus:border-sky-500"></textarea>
                <button onclick="generateImage()" class="bg-sky-700 hover:bg-sky-500 text-white w-full py-2 rounded mb-3 transition">GENERATE IMAGE</button>
                <div id="image-output" class="flex-grow border border-dashed border-slate-700 rounded flex items-center justify-center text-xs italic text-slate-500 overflow-hidden">
                    Result will appear here...
                </div>
            </div>

            <div class="glass p-4 rounded-xl col-span-1 md:col-span-2">
                <h2 class="text-lg font-bold mb-2 flex items-center">🔍 API_STORMER_v1.0</h2>
                <div class="flex gap-2 mb-3">
                    <input id="key-input" type="text" placeholder="AIzaSy..." class="flex-grow bg-slate-900 border border-slate-700 p-2 rounded text-white focus:outline-none focus:border-sky-500">
                    <button onclick="scanKey()" class="bg-amber-700 hover:bg-amber-600 text-white px-6 py-2 rounded transition">SCAN KEY</button>
                </div>
                <div id="scan-result" class="bg-black p-3 rounded border border-slate-800 text-xs font-mono min-h-[100px] whitespace-pre-wrap">
                    [WAITING FOR INPUT]
                </div>
            </div>

        </div>
    </div>

    <script>
        // FUNGSI CHAT
        function mhpChat() {
            const input = document.getElementById('chat-input');
            const display = document.getElementById('chat-display');
            if (!input.value) return;

            display.innerHTML += `<div class="text-white"><b>MHP:</b> ${input.value}</div>`;
            
            // Logika respons (Bisa di-upgrade ke Gemini API)
            setTimeout(() => {
                display.innerHTML += `<div class="text-sky-400"><b>AI:</b> Perintah [${input.value}] diterima. Memproses data dari server...</div>`;
                display.scrollTop = display.scrollHeight;
            }, 500);
            
            input.value = '';
        }

        // FUNGSI GENERATE GAMBAR
        function generateImage() {
            const prompt = document.getElementById('prompt-input').value;
            const output = document.getElementById('image-output');
            if (!prompt) return alert("Prompt kosong, bangsat!");

            output.innerHTML = `<div class="animate-pulse">SINKRONISASI AI... MEMBENTUK ASET...</div>`;
            
            // Menggunakan Pollinations API (No Key Required for basic)
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=512&height=512&seed=${Math.floor(Math.random()*1000)}`;
            
            const img = new Image();
            img.onload = () => { output.innerHTML = `<img src="${imgUrl}" class="h-full w-full object-cover">`; };
            img.src = imgUrl;
        }

        // FUNGSI SCAN KEY (OTOMATIS)
        async function scanKey() {
            const key = document.getElementById('key-input').value;
            const resBox = document.getElementById('scan-result');
            if (!key) return alert("Mana kuncinya, bangsat?");

            resBox.innerHTML = `[!] PROBING KEY: ${key}\n[!] CONNECTING TO GOOGLE CLOUD...`;

            try {
                const res = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/getProjectConfig?key=${key}`);
                const data = await res.json();

                if (res.ok) {
                    resBox.innerHTML = `<span class="text-yellow-400">[ SUCCESS ] STATUS: 200 OK\n[ INFO ] Project ID: ${data.projectId}\n[ INFO ] Domains: ${data.authorizedDomains.join(', ')}\n[ VERDICT ] KUNCI SAKTI! SIMPAN, MASTER!</span>`;
                } else {
                    resBox.innerHTML = `<span class="text-red-500">[ FAILED ] STATUS: ${res.status}\n[ MSG ] ${data.error.message}\n[ VERDICT ] KUNCI MATI/RESTRICTED.</span>`;
                }
            } catch (err) {
                resBox.innerHTML = `<span class="text-red-600">[ ERROR ] Gagal melakukan request ke API Google.</span>`;
            }
        }
    </script>
</body>
</html>
