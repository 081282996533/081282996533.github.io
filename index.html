<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MHP STUDIO - BY SUPER ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-bubble-ai { background: rgba(30, 41, 59, 0.5); border-bottom-left-radius: 2px; }
        .chat-bubble-user { background: linear-gradient(135deg, #2563eb, #7c3aed); border-bottom-right-radius: 2px; }
        .loader { border: 2px solid #1e293b; border-top: 2px solid #3b82f6; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center sticky top-0 z-50 glass-card">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center font-bold text-lg text-white">M</div>
            <h1 class="text-lg font-bold leading-none">Studio <span class="text-blue-400">MHP</span></h1>
        </div>
        <div id="status-badge" class="bg-red-500/10 px-3 py-1.5 rounded-full border border-red-500/20 flex items-center gap-2">
            <span id="status-dot" class="w-2 h-2 bg-red-500 rounded-full"></span>
            <span id="status-text" class="text-[10px] font-medium text-red-400 uppercase tracking-tighter">API CHECK</span>
        </div>
    </header>

    <main id="app-viewport" class="p-4 space-y-6">
        </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-card p-3 flex justify-around items-center border-t border-white/5 z-50">
        <button onclick="switchTab('chat')" class="nav-item flex flex-col items-center gap-1 opacity-50" id="nav-chat"><i data-lucide="bot" class="w-6 h-6"></i><span class="text-[10px]">Asisten</span></button>
        <button onclick="switchTab('image')" class="nav-item flex flex-col items-center gap-1 opacity-50" id="nav-image"><i data-lucide="sparkles" class="w-6 h-6"></i><span class="text-[10px]">Edit AI</span></button>
        <button onclick="switchTab('video')" class="nav-item flex flex-col items-center gap-1 opacity-50" id="nav-video"><i data-lucide="clapperboard" class="w-6 h-6"></i><span class="text-[10px]">Video AI</span></button>
    </nav>

    <script>
        // --- AMUNISI MASTER ---
        // Ganti dengan API Key yang bener-bener GACOR
        const MHP_KEY = "AIzaSyDaxsAHQnVvCO2cs-jr7u51UCgPcYrvq2I"; 
        let currentTab = 'chat';

        const views = {
            chat: `
                <div class="flex flex-col h-[70vh]">
                    <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pb-4">
                        <div class="chat-bubble-ai p-4 rounded-2xl max-w-[90%] text-sm border border-white/5">
                            <b>SYSTEM MHP READY!</b><br>Tulis perintah Master, biar sistem gedor servernya! 🚀
                        </div>
                    </div>
                    <div class="mt-auto flex gap-2 p-2 glass-card rounded-2xl">
                        <input type="text" id="chat-input" placeholder="Ketik pesan..." class="flex-1 bg-transparent border-none outline-none px-3 text-sm h-10 text-white">
                        <button onclick="processChat()" class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg active:scale-90"><i data-lucide="send-horizontal" class="w-5 h-5 text-white"></i></button>
                    </div>
                </div>`,
            image: `
                <div class="space-y-4">
                    <div class="glass-card p-6 text-center border-dashed border-2 border-slate-700 rounded-2xl">
                        <i data-lucide="image-plus" class="w-12 h-12 mx-auto mb-2 text-blue-500"></i>
                        <p class="text-[10px] uppercase text-slate-400 font-bold">Upload Media</p>
                        <input type="file" id="file-input" class="hidden" onchange="previewImage(event)">
                        <button onclick="document.getElementById('file-input').click()" class="mt-3 bg-white/5 px-4 py-2 rounded-full text-[10px] border border-white/10 uppercase font-bold">Pilih File</button>
                    </div>
                    <div id="preview-wrapper" class="hidden"><img id="img-preview" class="w-full rounded-xl border border-white/10"></div>
                    <textarea id="ai-prompt" placeholder="Beri instruksi edit..." class="w-full bg-slate-900/50 border border-white/5 rounded-xl p-3 text-sm h-24 outline-none text-white"></textarea>
                    <button onclick="alert('Sinkronisasi Engine MHP...')" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 py-3 rounded-xl font-bold text-sm">ANALISIS GAMBAR</button>
                </div>`,
            video: `<div class="p-12 text-center glass-card rounded-2xl"><i data-lucide="clapperboard" class="w-10 h-10 mx-auto text-slate-700 mb-2"></i><p class="text-[10px] font-bold text-slate-500 uppercase">Video Engine Connecting...</p></div>`
        };

        function updateStatus(isOnline, text = "ONLINE") {
            const dot = document.getElementById('status-dot');
            const badge = document.getElementById('status-badge');
            const statusText = document.getElementById('status-text');
            if(isOnline) {
                dot.className = "w-2 h-2 bg-blue-500 rounded-full animate-pulse";
                badge.className = "bg-blue-500/10 px-3 py-1.5 rounded-full border border-blue-500/20 flex items-center gap-2";
                statusText.innerText = text;
                statusText.className = "text-[10px] font-medium text-blue-400 uppercase tracking-tighter";
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('app-viewport').innerHTML = views[tab];
            document.querySelectorAll('.nav-item').forEach(el => el.classList.add('opacity-50'));
            document.getElementById(`nav-${tab}`).classList.remove('opacity-50');
            lucide.createIcons();
            if(tab === 'chat') {
                updateStatus(true, "READY");
                document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') processChat(); });
            }
        }

        async function processChat() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const prompt = input.value.trim();
            if (!prompt) return;

            chatBox.innerHTML += `<div class="chat-bubble-user p-4 rounded-2xl max-w-[85%] ml-auto text-sm shadow-xl">${prompt}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const loadId = 'ai-' + Date.now();
            chatBox.innerHTML += `<div id="${loadId}" class="chat-bubble-ai p-4 rounded-2xl max-w-[150px] flex items-center gap-3"><div class="loader"></div><span class="text-[10px] font-bold text-slate-400 uppercase">GEDOR SERVER...</span></div>`;

            try {
                // MODEL STABIL: GEMINI 1.5 FLASH
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MHP_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await res.json();
                
                if (data.error) {
                    let errMsg = data.error.message;
                    if(errMsg.includes("API_KEY_INVALID")) errMsg = "KUNCI MATI/EXPIRED, RAMPOK LAGI BOSS!";
                    if(errMsg.includes("not been used")) errMsg = "KLIK LINK DI LOG TADI BUAT ENABLE API!";
                    throw new Error(errMsg);
                }

                const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Respon kosong.";
                document.getElementById(loadId).remove();
                chatBox.innerHTML += `<div class="chat-bubble-ai p-4 rounded-2xl max-w-[95%] text-sm leading-relaxed border border-white/10 shadow-lg">${responseText.replace(/\n/g, '<br>')}</div>`;
            } catch (err) {
                document.getElementById(loadId).innerHTML = `<div class="p-2 text-red-400 text-[10px] font-bold leading-tight">SYSDAMAGE: ${err.message.toUpperCase()}</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function previewImage(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview-wrapper').classList.remove('hidden');
                document.getElementById('img-preview').src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        window.onload = () => switchTab('chat');
    </script>
</body>
</html>
