<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MHP STUDIO - ALL-IN-ONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.1/lucide-react.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .chat-bubble-ai { background: rgba(30, 41, 59, 0.5); border-bottom-left-radius: 2px; }
        .chat-bubble-user { background: linear-gradient(135deg, #2563eb, #7c3aed); border-bottom-right-radius: 2px; }
        .loader { border: 2px solid #1e293b; border-top: 2px solid #3b82f6; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-24">

    <header class="p-4 flex justify-between items-center sticky top-0 z-50 glass-card">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center font-bold text-lg">M</div>
            <h1 class="text-lg font-bold">Studio <span class="text-blue-400">MHP</span></h1>
        </div>
        <div class="bg-blue-500/10 px-3 py-1.5 rounded-full border border-blue-500/20 flex items-center gap-2">
            <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
            <span class="text-[10px] font-medium text-blue-400 uppercase">System Ready</span>
        </div>
    </header>

    <main id="app-viewport" class="p-4 space-y-6">
        </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-card p-3 flex justify-around items-center border-t border-white/5 z-50">
        <button onclick="switchTab('chat')" class="nav-item flex flex-col items-center gap-1 opacity-50" id="nav-chat"><i data-lucide="bot" class="w-6 h-6"></i><span class="text-[10px]">Asisten</span></button>
        <button onclick="switchTab('image')" class="nav-item flex flex-col items-center gap-1 opacity-50" id="nav-image"><i data-lucide="sparkles" class="w-6 h-6"></i><span class="text-[10px]">Edit AI</span></button>
        <button onclick="switchTab('video')" class="nav-item flex flex-col items-center gap-1 opacity-50" id="nav-video"><i data-lucide="clapperboard" class="w-6 h-6"></i><span class="text-[10px]">Video AI</span></button>
    </nav>

    <script>
        // --- KONFIGURASI PUSAT ---
        const MHP_KEY = "AIzaSyBTtQzwsHRgGWt7zcDABX_F8nErqtsRWMU"; // Bensin API Master
        let currentTab = 'chat';

        const views = {
            chat: `
                <div class="flex flex-col h-[70vh]">
                    <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 pb-4">
                        <div class="chat-bubble-ai p-4 rounded-2xl max-w-[90%] text-sm border border-white/5">Halo Super Admin MHP! Sistem Gemini 1.5 Flash aktif. Apa perintah Anda?</div>
                    </div>
                    <div class="mt-auto flex gap-2 p-2 glass-card rounded-2xl">
                        <input type="text" id="chat-input" placeholder="Tanya sesuatu..." class="flex-1 bg-transparent border-none outline-none px-3 text-sm h-10">
                        <button onclick="processChat()" class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg active:scale-90"><i data-lucide="send-horizontal" class="w-5 h-5"></i></button>
                    </div>
                </div>`,
            image: `
                <div class="space-y-4">
                    <div class="glass-card p-6 text-center border-dashed border-2 border-slate-700 rounded-2xl">
                        <i data-lucide="image-plus" class="w-12 h-12 mx-auto mb-2 text-blue-500"></i>
                        <p class="text-xs">Unggah Foto untuk Edit AI</p>
                        <input type="file" id="file-input" class="hidden" onchange="previewImage(event)">
                        <button onclick="document.getElementById('file-input').click()" class="mt-3 bg-white/5 px-4 py-2 rounded-full text-[10px] border border-white/10">Pilih File</button>
                    </div>
                    <div id="preview-wrapper" class="hidden"><img id="img-preview" class="w-full rounded-xl border border-white/10"></div>
                    <textarea id="ai-prompt" placeholder="Instruksi edit (Contoh: Beri efek cyberpunk)..." class="w-full bg-slate-900/50 border border-white/5 rounded-xl p-3 text-sm h-24 outline-none"></textarea>
                    <button onclick="alert('Engine Sedang Sinkronisasi')" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-sm">PROSES EDIT</button>
                </div>`,
            video: `<div class="p-8 text-center glass-card rounded-2xl"><i data-lucide="clapperboard" class="w-12 h-12 mx-auto text-slate-600 mb-2"></i><p class="text-sm">Video AI Engine memerlukan API khusus. Segera hadir di MHP Studio.</p></div>`
        };

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('app-viewport').innerHTML = views[tab];
            document.querySelectorAll('.nav-item').forEach(el => el.classList.add('opacity-50'));
            document.getElementById(`nav-${tab}`).classList.remove('opacity-50');
            lucide.createIcons();
            if(tab === 'chat') {
                document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') processChat(); });
            }
        }

        async function processChat() {
            const input = document.getElementById('chat-input');
            const chatBox = document.getElementById('chat-box');
            const prompt = input.value.trim();
            if (!prompt) return;

            chatBox.innerHTML += `<div class="chat-bubble-user p-4 rounded-2xl max-w-[85%] ml-auto text-sm shadow-xl">${prompt}</div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const loadId = 'ai-' + Date.now();
            chatBox.innerHTML += `<div id="${loadId}" class="chat-bubble-ai p-4 rounded-2xl max-w-[150px] flex items-center gap-3"><div class="loader"></div><span class="text-[10px] font-bold text-slate-400">BERPIKIR...</span></div>`;

            try {
                // MENGGUNAKAN MODEL YANG VALID (1.5 FLASH)
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MHP_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Server sibuk atau API Error, ASUUU!";
                
                document.getElementById(loadId).remove();
                chatBox.innerHTML += `<div class="chat-bubble-ai p-4 rounded-2xl max-w-[92%] text-sm leading-relaxed border border-white/10">${responseText.replace(/\n/g, '<br>')}</div>`;
            } catch (err) {
                document.getElementById(loadId).innerHTML = `<span class="text-red-400 text-[10px]">Error: ${err.message}</span>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function previewImage(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                document.getElementById('preview-wrapper').classList.remove('hidden');
                document.getElementById('img-preview').src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        window.onload = () => switchTab('chat');
    </script>
</body>
</html>
