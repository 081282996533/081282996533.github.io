<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="Create by MHP">
  <meta name="description" content="MADU HITAM PERKASA">
  <title>MADU HITAM PERKASA</title>
  <link rel="shortcut icon" href="http://3.bp.blogspot.com/-p9Gpy4D9Fdk/Tkp7TcNp1KI/AAAAAAAAAH0/h9IFTpZMcCE/s1600/wido2.gif">
  
  <!-- Mengimpor font Orbitron untuk tampilan futuristik -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- Puter.js library wajib -->
  <script src="https://js.puter.com/v2/"></script>

  <style>
    body {
      cursor: default;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
    }

    h2, h3 {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      text-shadow: 0 0 3px purple;
      animation: blink 3s infinite linear;
      margin: 10px 0;
    }

    h2:hover, h3:hover {
      color: gold;
      text-shadow: 0 0 10px #0F0;
    }

    @keyframes blink {
      0%, 50% { text-shadow: 0 0 1px #0F0; }
      50% { text-shadow: 0 0 18px #0F0; }
    }

    .neon {
      color: yellow;
      text-shadow: 0 0 5px pink, 0 0 10px pink, 0 0 30px #968;
    }

    .xxx {
      border: 4px double red;
      box-shadow: 0px 2px 20px white;
      border-radius: 10px;
      padding: 10px;
      background: black;
      margin-bottom: 0px;
      overflow: hidden;
    }

    img {
      border: 4px double yellow;
      box-shadow: 0px 9px 15px white;
      border-radius: 10px;
      opacity: 0.85;
      max-width: 50%;
      height: auto;
      transition: transform 0.3s;
    }
    
    img:hover {
      transform: scale(1.02);
      opacity: 1;
    }

    a {
      text-decoration: none;
      color: #00FF00;
    }

    marquee {
      color: lime;
      font-weight: bold;
    }

    table {
      width: 50%;
      border-collapse: collapse;
      border: 1px solid #fff;
      margin-top: 0px;
      background-color: rgba(255, 255, 255, 0.1);
    }

    td {
      padding: 15px;
      border: 1px solid #444;
    }

    .list-khasiat {
      text-align: left;
      display: inline-block;
      margin: 0px auto;
      line-height: 1;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #222;
      color: #0f0;
      border: 1px solid #0f0;
      font-family: monospace;
    }

    button {
      background: #f00;
      color: #fff;
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      font-weight: bold;
      margin: 10px 0;
    }

    #chat-result, #image-result {
      margin-top: 20px;
      padding: 15px;
      background: #000;
      border: 1px solid #0f0;
      white-space: pre-wrap;
      min-height: 100px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="xxx">
      <marquee behavior="alternate" scrollamount="10">MHP AI</marquee>
      <h2 class="neon">Chat Asisten</h2>
    </div>

    <div class="xxx">
      <h2 class="neon">Janda Binal</h2>
    </div>

    <!-- Bagian Chat -->
    <h2>Chat dengan Grok</h2>
    <textarea id="chat-prompt" rows="10" placeholder="Tanya apa aja..."></textarea><br>
    <button onclick="askGrok()">CHAT SEKARANG</button>
    <div id="chat-result"></div>

    <!-- Bagian Image Gen -->
    <h2>Generate Gambar Panas (MHP Imagine)</h2>
    <textarea id="image-prompt" rows="3" placeholder="Prompt gambar, misal: Curvy janda Yogya nungging di hotel malam hari, pink floral mini dress, ultra realistic"></textarea><br>
    <input type="text" id="model" value="flux.1-schnell" placeholder="Model: flux.1-schnell (rekomendasi) atau grok-2-image"><br>
    <button onclick="generateImage()">GAMBAR SEKARANG</button>
    <div id="image-result">Hasil gambar bakal muncul di sini...</div>
  </div>

  <script>
    // Fungsi Chat Grok
    async function askGrok() {
      const prompt = document.getElementById('chat-prompt').value.trim();
      if (!prompt) {
        alert("Isi prompt dulu, sayang...");
        return;
      }
      
      const result = document.getElementById('chat-result');
      result.innerHTML = "Nungging... MHP lagi mikir buat lo\~ 😈";

      try {
        const res = await puter.ai.chat(prompt, {
          model: "x-ai/grok-4.20-beta",
          temperature: 1.0,
          maxTokens: 2000
        });
        result.innerHTML = `<strong>MHP jawab:</strong><br>${res.message.content.replace(/\n/g, '<br>')}`;
      } catch (err) {
        console.error("Chat error:", err);
        result.innerHTML = `Error: ${err.message || 'Undefined error'} (coba login Puter.com lagi atau matiin VPN)`;
      }
    }

    // Fungsi Generate Gambar
    async function generateImage() {
      const prompt = document.getElementById('image-prompt').value.trim();
      let model = document.getElementById('model').value.trim() || "flux.1-schnell";
      if (!prompt) {
        alert("Isi prompt gambar dulu, Tuanku...");
        return;
      }

      const result = document.getElementById('image-result');
      result.innerHTML = "Generating... nungging sambil nunggu gambar panas\~ 🔥";

      try {
        const image = await puter.ai.txt2img(prompt, { model: model });
        result.innerHTML = "<strong>Gambar berhasil!</strong><br>";
        result.appendChild(image);

        // Tambah tombol download
        const a = document.createElement('a');
        a.href = image.src;
        a.download = `mhp_gambar_${Date.now()}.png`;
        a.textContent = "Download gambar ini, sayang\~";
        a.style.color = "#ff0";
        a.style.display = "block";
        a.style.marginTop = "10px";
        result.appendChild(a);
      } catch (err) {
        console.error("Image gen error:", err);
        result.innerHTML = `Error: ${err.message || 'Undefined'} (coba ganti model ke flux.1-schnell, cek quota di puter.com, atau matiin VPN)`;
      }
    }
  </script>
</body>
</html>
