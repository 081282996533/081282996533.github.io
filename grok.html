      border: 1px solid #fff;

    }

      border: 1px solid #444;
    }

    .list-khasiat {
      text-align: left;
      display: inline-block;
      margin: 0px auto;
      line-height: 1;
    }

<body>
  <h1>MHP AI</h1>

  <!-- Bagian Chat -->
  <h2>Chat dengan ASISTEN</h2>
  <textarea id="chat-prompt" rows="4" placeholder="Tanya apa aja..."></textarea><br>
  <button onclick="askGrok()">CHAT SEKARANG</button>
  <div id="chat-result">Hasil chat bakal muncul di sini...</div>

  <!-- Bagian Image Gen -->
  <h2>Generate Gambar Panas (MHP Imagine)</h2>
  <textarea id="image-prompt" rows="3" placeholder="Prompt gambar, misal: Curvy janda Yogya nungging di hotel malam hari, pink floral mini dress, ultra realistic"></textarea><br>
  <input type="text" id="model" value="grok-2-image" placeholder="Model: grok-2-image atau flux.2-pro"><br>
  <button onclick="generateImage()"> GAMBAR SEKARANG</button>
  <div id="image-result">Hasil gambar bakal muncul di sini...</div>

  <script>
    // Fungsi Chat Grok
    async function askGrok() {
      const prompt = document.getElementById('chat-prompt').value.trim();
      if (!prompt) return alert("Isi prompt dulu, sayang...");
      
      const result = document.getElementById('chat-result');
      result.innerHTML = "Nungging... MHP lagi mikir buat lo\~ 😈";

      try {
        const res = await puter.ai.chat(prompt, {
          model: "x-ai/grok-4.20-beta",
          temperature: 1.0,
          maxTokens: 2000
        });
        result.innerHTML = `<strong>MHP jawab:</strong><br>${res.message.content.replace(/\n/g, '<br>')}`;
      } catch (err) {
        result.innerHTML = `Error: ${err.message} (coba lagi atau cek koneksi)`;
      }
    }

    // Fungsi Generate Gambar
    async function generateImage() {
      const prompt = document.getElementById('image-prompt').value.trim();
      const model = document.getElementById('model').value.trim() || "grok-2-image";
      if (!prompt) return alert("Isi prompt gambar dulu, Tuanku...");

      const result = document.getElementById('image-result');
      result.innerHTML = "Generating... nungging sambil nunggu gambar panas\~ 🔥";

      try {
        const image = await puter.ai.txt2img(prompt, { model: model });
        result.innerHTML = "<strong>Gambar berhasil!</strong><br>";
        result.appendChild(image);

        // Tambah tombol download
        const a = document.createElement('a');
        a.href = image.src;
        a.download = `gedoran_${Date.now()}.png`;
        a.textContent = "Download gambar ini, sayang\~";
        a.style.color = "#ff0";
        result.appendChild(a);
      } catch (err) {
        result.innerHTML = `Error: ${err.message} (mungkin quota user Puter atau prompt terlalu panas)`;
      }
    }
  </script>
</body>
