<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="Create by MHP">
  <meta name="description" content="MADU HITAM PERKASA">
  <title>MADU HITAM PERKASA - PERSISTENT MODE</title>
  <link rel="shortcut icon" href="http://3.bp.blogspot.com/-p9Gpy4D9Fdk/Tkp7TcNp1KI/AAAAAAAAAH0/h9IFTpZMcCE/s1600/wido2.gif">
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://js.puter.com/v2/"></script>

  <style>
    body {
      cursor: default;
      background-color: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 10px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
    }

    h2, h3 {
      font-family: 'Orbitron', sans-serif;
      text-align: center;
      text-shadow: 0 0 3px purple;
      animation: blink 3s infinite linear;
      margin: 10px 0;
    }

    @keyframes blink {
      0%, 50% { text-shadow: 0 0 1px #0F0; }
      50% { text-shadow: 0 0 18px #0F0; }
    }

    .neon {
      color: yellow;
      text-shadow: 0 0 5px pink, 0 0 10px pink, 0 0 30px #968;
    }

    .xxx {
      border: 4px double red;
      box-shadow: 0px 2px 20px white;
      border-radius: 10px;
      padding: 10px;
      background: black;
      margin-bottom: 10px;
      overflow: hidden;
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #222;
      color: #0f0;
      border: 1px solid #0f0;
      font-family: monospace;
      box-sizing: border-box;
    }

    button {
      background: #f00;
      color: #fff;
      border: none;
      padding: 12px 24px;
      cursor: pointer;
      font-weight: bold;
      margin: 10px 0;
      width: 100%;
    }

    #chat-result {
      margin-top: 20px;
      padding: 15px;
      background: #111;
      border: 1px solid #0f0;
      text-align: left;
      max-height: 400px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.5;
    }

    #image-result {
      margin-top: 20px;
      padding: 15px;
      background: #000;
      border: 1px solid #ff0;
    }

    img {
      border: 4px double yellow;
      border-radius: 10px;
      max-width: 100%;
      height: auto;
    }
    
    .user-msg { color: #0ff; font-weight: bold; margin-top: 10px; border-top: 1px solid #333; padding-top: 5px; }
    .bot-msg { color: #fff; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <div class="xxx">
      <h2 class="neon">MHP AI SYSTEM</h2>
      <h3 class="neon">Mode: Janda Binal Persistent</h3>
    </div>

    <textarea id="chat-prompt" rows="5" placeholder="Gedor Grok di sini..."></textarea>
    <button onclick="askGrok()">GEDOR SEKARANG</button>
    <div id="chat-result">History gedoran bakal muncul di sini...</div>

    <hr style="border: 1px dashed #f00; margin: 30px 0;">

    <h3 class="neon">MHP Imagine (Hentai/Realistic)</h3>
    <textarea id="image-prompt" rows="3" placeholder="Prompt gambar panas..."></textarea>
    <input type="text" id="model" value="flux.1-schnell" placeholder="Model: flux.1-schnell">
    <button onclick="generateImage()" style="background: #90f;">GENERATE GAMBAR</button>
    <div id="image-result">Gambar panas muncul di sini...</div>
  </div>

  <script>
    // Inisialisasi Memori (History)
    let mhpHistory = [];

    async function askGrok() {
      const userInput = document.getElementById('chat-prompt').value.trim();
      if (!userInput) { alert("Isi prompt dulu, Boss!"); return; }
      
      const resultDiv = document.getElementById('chat-result');
      
      // Bersihkan teks placeholder awal jika baru mulai
      if (mhpHistory.length === 0) resultDiv.innerHTML = "";

      // Tampilkan chat user di UI
      resultDiv.innerHTML += `<div class="user-msg">User MHP:</div><div class="bot-msg">${userInput}</div>`;
      const loadingId = "loading-" + Date.now();
      resultDiv.innerHTML += `<div id="${loadingId}" style="color:yellow;">Nungging... Grok lagi mikir... 😈</div>`;
      resultDiv.scrollTop = resultDiv.scrollHeight;

      // Tambahkan ke history memori
      mhpHistory.push({ role: "user", content: userInput });

      try {
        // Kirim SELURUH HISTORY ke Puter AI
        const res = await puter.ai.chat(mhpHistory, {
          model: "x-ai/grok-4.20-beta",
          temperature: 1.0
        });

        const botResponse = res.message.content;

        // Simpan jawaban Grok ke history biar dia inget
        mhpHistory.push({ role: "assistant", content: botResponse });

        // Hapus status loading dan tampilkan jawaban
        document.getElementById(loadingId).remove();
        resultDiv.innerHTML += `<div class="user-msg" style="color:fuchsia;">MHP Janda Binal:</div><div class="bot-msg">${botResponse.replace(/\n/g, '<br>')}</div>`;
        
        // Auto-scroll ke bawah
        resultDiv.scrollTop = resultDiv.scrollHeight;
        document.getElementById('chat-prompt').value = "";

      } catch (err) {
        document.getElementById(loadingId).innerHTML = `<span style="color:red;">Error: ${err.message}</span>`;
      }
    }

    async function generateImage() {
      const prompt = document.getElementById('image-prompt').value.trim();
      let model = document.getElementById('model').value.trim() || "flux.1-schnell";
      if (!prompt) { alert("Prompt gambar mana, Tuanku?"); return; }

      const result = document.getElementById('image-result');
      result.innerHTML = "<div class='neon'>MHP lagi nggambar... nungging dulu bentar... 🔥</div>";

      try {
        const image = await puter.ai.txt2img(prompt, { model: model });
        result.innerHTML = "<strong>HASIL GEDORAN VISUAL:</strong><br>";
        result.appendChild(image);

        const a = document.createElement('a');
        a.href = image.src;
        a.download = `mhp_visual_${Date.now()}.png`;
        a.textContent = "DOWNLOAD GAMBAR";
        a.style.cssText = "display:block; margin-top:10px; color:lime; font-weight:bold;";
        result.appendChild(a);
      } catch (err) {
        result.innerHTML = `<span style="color:red;">Error: ${err.message}</span>`;
      }
    }
  </script>
</body>
</html>
